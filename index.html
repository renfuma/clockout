<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>退勤管理</title>
</head>
<body>
  <h1>退勤記録</h1>

  <p id="result">記録中...</p>

  <script>
    function recordTime() {
      const now = new Date();
      document.getElementById("result").innerText =
        "退勤時間：" + now.toLocaleString();
    }

    // ページ開いた瞬間に実行
    window.onload = recordTime;
  
setTimeout(() => {
  history.back();
}, 2000); // 2秒後に戻る
  </script>
</body>
</html>
